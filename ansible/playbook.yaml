---
- name: Install k3s on the lab server
  hosts: k3s_servers
  become: true

  tasks:
    - name: Install k3s (official install script)
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Verify k3s installation
      ansible.builtin.command: k3s --version
      register: k3s_version
      changed_when: false

    - name: Show installed version
      ansible.builtin.debug:
        var: k3s_version.stdout_lines

- name: Install Helm, Prometheus stack, Loki, Ingress, and prepare kubeconfig access
  hosts: k3s_servers
  become: true

  pre_tasks:
    - name: Ensure KUBECONFIG is accessible for Helm commands
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
      args:
        creates: /root/.kube/config

    - name: Check if the logging namespace exists
      ansible.builtin.command: kubectl get namespace logging
      register: logging_ns
      failed_when: false
      changed_when: false

    - name: Create the logging namespace
      ansible.builtin.command: kubectl create namespace logging
      when: logging_ns.rc != 0

  roles:
    - helm
    - prometheus
    - loki
    - tempo
    - ingress
    - app

  tasks:
    - name: Ensure KUBECONFIG is accessible for azureuser (non-root) commands
      ansible.builtin.shell: |
        mkdir -p /home/{{ ansible_user }}/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/{{ ansible_user }}/.kube/config
        chown {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube/config
      args:
        creates: /home/{{ ansible_user }}/.kube/config

    - name: Persist KUBECONFIG env var for azureuser shell sessions
      ansible.builtin.lineinfile:
        path: /home/{{ ansible_user }}/.bashrc
        line: 'export KUBECONFIG=$HOME/.kube/config'
        create: true