apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability
  template:
    metadata:
      labels:
        app: observability
    spec:
      containers:
      - name: observability
        image: asdfghjkl0/observability-lab:2.0.0
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "tempo.tracing.svc.cluster.local:4317"
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: observability-svc
  namespace: app
  labels:
    app: observability
spec:
  selector:
    app: observability
  ports:
  - name: http   
    port: 8080
    targetPort: 8080
